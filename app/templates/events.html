{% extends "base.html" %}
{% block title %}Events - CatDetect{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Detection Events</h1>
</div>

<div class="filter-bar">
    <select id="filterCamera" onchange="currentPage=0; loadEvents()">
        <option value="">All Cameras</option>
    </select>
    <select id="filterCat" onchange="currentPage=0; loadEvents()">
        <option value="">All Cats</option>
    </select>
    <button class="btn btn-sm" onclick="loadEvents()">Refresh</button>
</div>

<div class="event-list" id="eventList">
    <p class="empty-state">Loading...</p>
</div>

<div class="pagination" id="pagination"></div>
{% endblock %}

{% block scripts %}
<script src="/static/js/events.js"></script>
<script>
const PAGE_SIZE = 50;
let currentPage = 0;

document.addEventListener('DOMContentLoaded', async () => {
    // Load filter options
    const cameras = await apiFetch('/api/v1/cameras');
    const camSelect = document.getElementById('filterCamera');
    cameras.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.name;
        camSelect.appendChild(opt);
    });

    const cats = await apiFetch('/api/v1/cats');
    const catSelect = document.getElementById('filterCat');
    cats.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.name;
        catSelect.appendChild(opt);
    });

    // Check URL params
    const params = new URLSearchParams(window.location.search);
    if (params.get('cat_id')) document.getElementById('filterCat').value = params.get('cat_id');
    if (params.get('camera_id')) document.getElementById('filterCamera').value = params.get('camera_id');

    loadEvents();
});

async function loadEvents() {
    const cameraId = document.getElementById('filterCamera').value;
    const catId = document.getElementById('filterCat').value;
    const offset = currentPage * PAGE_SIZE;
    let url = `/api/v1/events?limit=${PAGE_SIZE}&offset=${offset}`;
    if (cameraId) url += `&camera_id=${cameraId}`;
    if (catId) url += `&cat_id=${catId}`;

    const data = await apiFetch(url);
    renderEventList(data.items, document.getElementById('eventList'));

    // Pagination
    const total = data.total;
    const totalPages = Math.ceil(total / PAGE_SIZE);
    const pag = document.getElementById('pagination');
    if (totalPages <= 1) {
        pag.innerHTML = total > 0 ? `<span>${total} event${total !== 1 ? 's' : ''}</span>` : '';
        return;
    }

    let btns = '';
    btns += `<button class="btn btn-secondary btn-sm" onclick="goToPage(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>&laquo; Prev</button>`;
    for (let i = 0; i < totalPages; i++) {
        btns += `<button class="btn btn-sm ${i === currentPage ? 'btn-primary' : 'btn-secondary'}" onclick="goToPage(${i})">${i + 1}</button>`;
    }
    btns += `<button class="btn btn-secondary btn-sm" onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>Next &raquo;</button>`;
    btns += `<span style="margin-left:8px">${total} event${total !== 1 ? 's' : ''}</span>`;
    pag.innerHTML = btns;
}

function goToPage(page) {
    currentPage = page;
    loadEvents();
}
</script>
{% endblock %}
