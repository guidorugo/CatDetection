services:
  catdetect:
    build:
      context: ..
      dockerfile: docker/Dockerfile.jetson
      network: host
    runtime: nvidia
    container_name: catdetect
    restart: unless-stopped
    network_mode: host
    volumes:
      - /ssd/projects/cat-detection-project/data:/app/data
      - /ssd/projects/cat-detection-project/models:/app/models
      - /ssd/projects/cat-detection-project/recordings:/app/recordings
      - /ssd/projects/cat-detection-project/thumbnails:/app/thumbnails
      - catdetect-db:/app/db
      - ~/.ssh:/root/.ssh-mount:ro
    env_file:
      - ../.env
    environment:
      # Override DATABASE_URL to use the Docker volume path
      - DATABASE_URL=sqlite+aiosqlite:///./db/catdetect.db
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  catdetect-db:
